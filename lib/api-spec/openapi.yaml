openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Matka Admin Panel API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User management
  - name: markets
    description: Market management
  - name: results
    description: Result declaration
  - name: bids
    description: Bid management
  - name: deposits
    description: Deposit management
  - name: withdrawals
    description: Withdrawal management
  - name: game-rates
    description: Game rates
  - name: notices
    description: Notices
  - name: settings
    description: Settings
  - name: dashboard
    description: Dashboard statistics
  - name: scraper
    description: Auto result scraper system
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: adminLogin
      tags: [auth]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/signup:
    post:
      operationId: userSignup
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignupResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Phone already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getAdminMe
      tags: [auth]
      summary: Get current admin info
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Admin info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /users:
    get:
      operationId: getUsers
      tags: [users]
      summary: List all users
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: search
          schema:
            type: string
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"

  /users/{id}:
    get:
      operationId: getUserById
      tags: [users]
      summary: Get user by ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user (block/unblock, update wallet)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /markets:
    get:
      operationId: getMarkets
      tags: [markets]
      summary: List all markets
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of markets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Market"
    post:
      operationId: createMarket
      tags: [markets]
      summary: Create a new market
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMarketRequest"
      responses:
        "201":
          description: Created market
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Market"

  /markets/{id}:
    get:
      operationId: getMarketById
      tags: [markets]
      summary: Get market by ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Market
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Market"
    put:
      operationId: updateMarket
      tags: [markets]
      summary: Update market
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMarketRequest"
      responses:
        "200":
          description: Updated market
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Market"
    delete:
      operationId: deleteMarket
      tags: [markets]
      summary: Delete market
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /markets/{id}/auto-config:
    put:
      operationId: updateMarketAutoConfig
      tags: [markets]
      summary: Update market auto-update configuration
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarketAutoConfigRequest"
      responses:
        "200":
          description: Updated market
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Market"

  /markets/{id}/fetch-now:
    post:
      operationId: fetchMarketResultNow
      tags: [markets]
      summary: Manually trigger result fetch for a market
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Fetch result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FetchResultResponse"

  /scraper/logs:
    get:
      operationId: getScraperLogs
      tags: [scraper]
      summary: Get scraper logs
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: marketId
          schema:
            type: integer
      responses:
        "200":
          description: Scraper logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScraperLog"

  /scraper/status:
    get:
      operationId: getScraperStatus
      tags: [scraper]
      summary: Get scraper scheduler status
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Scraper status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScraperStatus"

  /results:
    get:
      operationId: getResults
      tags: [results]
      summary: List results
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: marketId
          schema:
            type: integer
        - in: query
          name: date
          schema:
            type: string
      responses:
        "200":
          description: List of results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Result"
    post:
      operationId: declareResult
      tags: [results]
      summary: Declare a result
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeclareResultRequest"
      responses:
        "201":
          description: Declared result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"

  /bids:
    get:
      operationId: getBids
      tags: [bids]
      summary: List all bids
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: marketId
          schema:
            type: integer
        - in: query
          name: userId
          schema:
            type: integer
        - in: query
          name: status
          schema:
            type: string
      responses:
        "200":
          description: List of bids
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BidListResponse"

  /deposits:
    get:
      operationId: getDeposits
      tags: [deposits]
      summary: List deposit requests
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
      responses:
        "200":
          description: List of deposits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Deposit"

  /deposits/{id}/approve:
    post:
      operationId: approveDeposit
      tags: [deposits]
      summary: Approve a deposit
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved deposit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deposit"

  /deposits/{id}/reject:
    post:
      operationId: rejectDeposit
      tags: [deposits]
      summary: Reject a deposit
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rejected deposit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deposit"

  /withdrawals:
    get:
      operationId: getWithdrawals
      tags: [withdrawals]
      summary: List withdrawal requests
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
      responses:
        "200":
          description: List of withdrawals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Withdrawal"

  /withdrawals/{id}/approve:
    post:
      operationId: approveWithdrawal
      tags: [withdrawals]
      summary: Approve a withdrawal
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved withdrawal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Withdrawal"

  /withdrawals/{id}/reject:
    post:
      operationId: rejectWithdrawal
      tags: [withdrawals]
      summary: Reject a withdrawal
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rejected withdrawal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Withdrawal"

  /game-rates:
    get:
      operationId: getGameRates
      tags: [game-rates]
      summary: Get game rates
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Game rates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameRates"
    put:
      operationId: updateGameRates
      tags: [game-rates]
      summary: Update game rates
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GameRates"
      responses:
        "200":
          description: Updated game rates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameRates"

  /notices:
    get:
      operationId: getNotices
      tags: [notices]
      summary: List notices
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of notices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notice"
    post:
      operationId: createNotice
      tags: [notices]
      summary: Create a notice
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNoticeRequest"
      responses:
        "201":
          description: Created notice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notice"

  /notices/{id}:
    delete:
      operationId: deleteNotice
      tags: [notices]
      summary: Delete a notice
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get app settings
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSettings"
    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update app settings
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppSettings"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSettings"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message

    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        admin:
          $ref: "#/components/schemas/Admin"
      required:
        - token
        - admin

    SignupRequest:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        password:
          type: string
      required:
        - name
        - phone
        - password

    SignupResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - token
        - user

    Admin:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        createdAt:
          type: string
      required:
        - id
        - email
        - name
        - createdAt

    DashboardStats:
      type: object
      properties:
        totalUsers:
          type: integer
        totalBidsToday:
          type: integer
        totalProfit:
          type: number
        activeMarkets:
          type: integer
        depositsToday:
          type: number
        withdrawalsToday:
          type: number
        recentBids:
          type: array
          items:
            $ref: "#/components/schemas/Bid"
      required:
        - totalUsers
        - totalBidsToday
        - totalProfit
        - activeMarkets
        - depositsToday
        - withdrawalsToday
        - recentBids

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        walletBalance:
          type: number
        isBlocked:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - name
        - phone
        - walletBalance
        - isBlocked
        - createdAt

    UserListResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - users
        - total
        - page
        - limit

    UpdateUserRequest:
      type: object
      properties:
        isBlocked:
          type: boolean
        walletBalance:
          type: number
        name:
          type: string
        phone:
          type: string

    Market:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        openTime:
          type: string
        closeTime:
          type: string
        isActive:
          type: boolean
        openResult:
          type: string
          nullable: true
        closeResult:
          type: string
          nullable: true
        jodiResult:
          type: string
          nullable: true
        autoUpdate:
          type: boolean
        sourceUrl:
          type: string
          nullable: true
        lastFetchedAt:
          type: string
          nullable: true
        fetchError:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - name
        - openTime
        - closeTime
        - isActive
        - autoUpdate
        - createdAt

    MarketAutoConfigRequest:
      type: object
      properties:
        autoUpdate:
          type: boolean
        sourceUrl:
          type: string
          nullable: true
      required:
        - autoUpdate

    FetchResultResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        openResult:
          type: string
          nullable: true
        closeResult:
          type: string
          nullable: true
        jodiResult:
          type: string
          nullable: true
      required:
        - success
        - message

    ScraperLog:
      type: object
      properties:
        id:
          type: integer
        marketId:
          type: integer
          nullable: true
        marketName:
          type: string
          nullable: true
        sourceUrl:
          type: string
          nullable: true
        success:
          type: boolean
        openResult:
          type: string
          nullable: true
        closeResult:
          type: string
          nullable: true
        jodiResult:
          type: string
          nullable: true
        errorMessage:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - success
        - createdAt

    ScraperStatus:
      type: object
      properties:
        isRunning:
          type: boolean
        totalMarketsWithAutoUpdate:
          type: integer
        lastRunAt:
          type: string
          nullable: true
        nextRunIn:
          type: string
      required:
        - isRunning
        - totalMarketsWithAutoUpdate
        - nextRunIn

    CreateMarketRequest:
      type: object
      properties:
        name:
          type: string
        openTime:
          type: string
        closeTime:
          type: string
        isActive:
          type: boolean
      required:
        - name
        - openTime
        - closeTime
        - isActive

    Result:
      type: object
      properties:
        id:
          type: integer
        marketId:
          type: integer
        marketName:
          type: string
        resultDate:
          type: string
        openResult:
          type: string
          nullable: true
        closeResult:
          type: string
          nullable: true
        jodiResult:
          type: string
          nullable: true
        pannaResult:
          type: string
          nullable: true
        declaredAt:
          type: string
          nullable: true
      required:
        - id
        - marketId
        - marketName
        - resultDate

    DeclareResultRequest:
      type: object
      properties:
        marketId:
          type: integer
        resultDate:
          type: string
        openResult:
          type: string
        closeResult:
          type: string
        jodiResult:
          type: string
        pannaResult:
          type: string
      required:
        - marketId
        - resultDate

    Bid:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        userName:
          type: string
        marketId:
          type: integer
        marketName:
          type: string
        gameType:
          type: string
        amount:
          type: number
        digit:
          type: string
        openTime:
          type: string
        closeTime:
          type: string
        currentTime:
          type: string
        status:
          type: string
        createdAt:
          type: string
      required:
        - id
        - userId
        - marketId
        - marketName
        - gameType
        - amount
        - digit
        - status
        - createdAt

    BidListResponse:
      type: object
      properties:
        bids:
          type: array
          items:
            $ref: "#/components/schemas/Bid"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - bids
        - total
        - page
        - limit

    Deposit:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        userName:
          type: string
        amount:
          type: number
        status:
          type: string
        paymentMethod:
          type: string
        transactionId:
          type: string
          nullable: true
        screenshotUrl:
          type: string
          nullable: true
        createdAt:
          type: string
        processedAt:
          type: string
          nullable: true
      required:
        - id
        - userId
        - userName
        - amount
        - status
        - paymentMethod
        - createdAt

    Withdrawal:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        userName:
          type: string
        amount:
          type: number
        status:
          type: string
        bankName:
          type: string
          nullable: true
        accountNumber:
          type: string
          nullable: true
        ifscCode:
          type: string
          nullable: true
        upiId:
          type: string
          nullable: true
        createdAt:
          type: string
        processedAt:
          type: string
          nullable: true
      required:
        - id
        - userId
        - userName
        - amount
        - status
        - createdAt

    GameRates:
      type: object
      properties:
        singleDigit:
          type: number
        jodiDigit:
          type: number
        singlePanna:
          type: number
        doublePanna:
          type: number
        triplePanna:
          type: number
        halfSangam:
          type: number
        fullSangam:
          type: number
      required:
        - singleDigit
        - jodiDigit
        - singlePanna
        - doublePanna
        - triplePanna
        - halfSangam
        - fullSangam

    Notice:
      type: object
      properties:
        id:
          type: integer
