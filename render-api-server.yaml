services:
  - type: web
    name: matka-api-server
    env: node
    plan: free
    runtime: node-18
    region: oregon
    buildCommand: "npm install && npm run build"
    startCommand: "npm run start"
    healthCheckPath: /api/health
    healthCheckInterval: 300
    
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: DATABASE_URL
        sync: false
      - key: APP_URL
        sync: false
      - key: FRONTEND_URL
        value: https://matka-admin.hostinger.in
      - key: FRONTEND_URL_WWW
        value: https://www.matka-admin.hostinger.in
